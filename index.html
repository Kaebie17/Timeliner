<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronology Samajh</title>
  <link rel="stylesheet" href="src/style.css">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Chronology Samajh">
</head>

<body>
  <div id="app">
    <header>
      <h1>Chronology Samajh</h1>
      <button id="navBtn" class="btn-primary" style="width: auto;">📁 Library</button>
    </header>

    <!-- Form Page -->
    <div class="entry-box">
      <form id="eventForm">
        <!-- 1. COLLECTION NAME (Searchable) -->
        <label class="section-label">Collection Name</label>
        <div class="topic-wrapper">
          <input type="text" id="eventTypeInput" placeholder="e.g., Birthday, Mughal Empire" autocomplete="off"
            required>
          <!-- This is the box where your JS will inject the suggestions -->
          <div id="topicSuggestions" class="suggestions-box"></div>
        </div>
        <label class="section-label">Timeline Point</label>
        <div class="row">
          <!-- 2. MODE SELECTOR -->
          <select id="dateType">
            <option value="date">Exact Date</option>
            <option value="year">Year</option>
            <option value="century">Century</option>
          </select>

          <!-- 3. DATA ENTRY AREA (70:30 Split) -->
          <div class="input-group">
            <div class="data-entry-area">
              <!-- Exact Date Input (Changed to text for mobile typing) -->
              <input type="text" id="dateVal" placeholder="DD-MM-YYYY" inputmode="numeric">

              <!-- Year Boxes (Hidden by default) -->
              <div id="yearInputs" class="hidden digit-row">
                <div class="digit-wrapper"><input type="text" id="y1" maxlength="1" inputmode="numeric">
                  <div class="picker"></div>
                </div>
                <div class="digit-wrapper"><input type="text" id="y2" maxlength="1" inputmode="numeric">
                  <div class="picker"></div>
                </div>
                <div class="digit-wrapper"><input type="text" id="y3" maxlength="1" inputmode="numeric">
                  <div class="picker"></div>
                </div>
                <div class="digit-wrapper"><input type="text" id="y4" maxlength="1" inputmode="numeric">
                  <div class="picker"></div>
                </div>
              </div>

              <!-- Century Boxes (Hidden by default) -->
              <div id="centuryInputs" class="hidden digit-row">
                <div class="digit-wrapper"><input type="text" id="c1" maxlength="1" inputmode="numeric">
                  <div class="picker"></div>
                </div>
                <div class="digit-wrapper"><input type="text" id="c2" maxlength="1" inputmode="numeric">
                  <div class="picker"></div>
                </div>
              </div>
            </div>

            <!-- 4. ERA SELECTOR (30%) -->
            <select id="era">
              <option value="CE">CE</option>
              <option value="BCE">BCE</option>
            </select>
          </div>
        </div>

        <textarea id="notes" placeholder="Notes / Description..." required></textarea>
        <button type="submit" class="btn-primary">Add to Chronology</button>
      </form>
    </div>
    </section>

    <!-- Library Page -->
    <section id="pageLibrary" class="hidden">
      <div id="libraryGrid" class="grid"></div>
    </section>

    <!-- Timeline Page -->
    <section id="pageTimeline" class="hidden">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2 id="displayTitle"></h2>
        <button id="exportBtn">Export PDF</button>
      </div>
      <div id="timelineContent" class="timeline-container"></div>
    </section>
  </div>
  <script type="module" src="src/main.js"></script>
</body>

</html>
