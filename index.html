<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronology Samajh</title>
  <link rel="stylesheet" href="src/style.css">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Chronology Samajh">
</head>
<body>
  <div id="app">
  <header>
    <h1>Chronology Samajh</h1>
    <button id="backBtn" class="btn-secondary hidden">← Library</button>
  </header>

  <!-- Input Area (Always visible at top for quick entry) -->
  <section class="entry-box">
    <form id="eventForm">
      <div class="input-group">
        <input type="text" id="topicInput" list="topicList" placeholder="Chronology Name (e.g., History)" required>
        <datalist id="topicList"></datalist>
        <input type="text" id="eventTitle" placeholder="Event Title" required>
      </div>
      <div class="row">
        <select id="dateType">
          <option value="date">Date</option>
          <option value="year">Year</option>
          <option value="century">Century</option>
        </select>
        <input type="date" id="dateVal" required>
      </div>
      <textarea id="desc" placeholder="Notes..."></textarea>
      <button type="submit" class="btn-primary">Add to Chronology</button>
    </form>
  </section>

  <!-- Library View -->
  <section id="librarySection">
    <h2 class="section-label">My Chronologies</h2>
    <div id="libraryGrid" class="grid"></div>
  </section>

  <!-- Timeline Detail View -->
  <section id="timelineSection" class="hidden">
    <div class="detail-header">
      <h2 id="timelineTitle"></h2>
      <button id="exportBtn" class="btn-s">Download PDF</button>
    </div>
    <div id="timelineDisplay" class="timeline-container">
      <!-- Watermark and Events -->
    </div>
  </section>
</div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
