<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronology Samajh</title>
  <link rel="stylesheet" href="src/style.css">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Chronology Samajh">
</head>
<body>
  <div id="app">
    <header>
      <h1>Chronology</h1>
      <button id="navBtn" class="btn-primary" style="width: auto;">📁 Library</button>
    </header>

    <!-- Form Page -->
    <section id="pageForm">
      <div class="entry-box">
        <form id="eventForm">
          <input type="text" id="eventTypeInput" placeholder="Event Type..." required>

<div class="row">
  <!-- 1. The Mode Selector -->
  <select id="dateType">
    <option value="date">Date</option>
    <option value="year">Year</option>
    <option value="century">Century</option>
  </select>

  <!-- 2. The Group containing 70:30 Logic -->
  <div class="input-group">
    
    <!-- The 70% Area -->
    <div class="data-entry-area">
      <!-- Standard Date -->
      <input type="text" id="dateVal" inputmode="numeric" placeholder="DD-MM-YYYY" pattern="\d{2}-\d{2}-\d{4}">

      <!-- Year Boxes (Hidden by default) -->
        <div id="yearInputs" class="hidden" style="display:flex; width:100%; gap:5px;">
                  <select id="y1" class="digit-select"></select>
                  <select id="y2" class="digit-select"></select>
                  <select id="y3" class="digit-select"></select>
                  <select id="y4" class="digit-select"></select>
                </div>

                <!-- Century Boxes (Hidden by default) -->
                <div id="centuryInputs" class="hidden" style="display:flex; width:100%; gap:5px;">
                  <select id="c1" class="digit-select"></select>
                  <select id="c2" class="digit-select"></select>
                </div>
              </div>

              <!-- The 30% Area -->
              <select id="era">
                <option value="CE">CE</option>
                <option value="BCE">BCE</option>
              </select>
            </div>
          </div>
          <textarea id="notes" placeholder="Notes / Description..." required></textarea>
          <button type="submit" class="btn-primary">Add to Chronology</button>
        </form>
      </div>
    </section>

    <!-- Library Page -->
    <section id="pageLibrary" class="hidden">
      <div id="libraryGrid" class="grid"></div>
    </section>

    <!-- Timeline Page -->
    <section id="pageTimeline" class="hidden">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2 id="displayTitle"></h2>
        <button id="exportBtn">Export PDF</button>
      </div>
      <div id="timelineContent" class="timeline-container"></div>
    </section>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
