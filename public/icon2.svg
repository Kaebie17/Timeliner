<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="#4f46e5"/>
  <defs>
    <clipPath id="headBoundary">
      <path d="M42,100 C42,10 250,10 250,100 C250,150 240,185 240,240 C240,285 190,310 146,310 C102,310 52,285 52,240 C52,185 42,150 42,100 Z" />
    </clipPath>
  </defs>

  <g transform="translate(256, 256) rotate(-12) scale(1.45) translate(-146, -160)">
    <!-- 1. The Head Silhouette -->
    <path d="M42,100 C42,10 250,10 250,100 C250,150 240,185 240,240 C240,285 190,310 146,310 C102,310 52,285 52,240 C52,185 42,150 42,100 Z" 
          stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="white" fill-opacity="0.05"/>
    
    <!-- 2. The U-Shaped Beard (Ridges) -->
    <g clip-path="url(#headBoundary)">
      <g stroke="white" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5">
        <!-- Lines are placed starting from a 'U' curve (y increases toward center) -->
        <!-- Left (Long) -->
        <path d="M60,205 v120 M70,212 v120 M80,220 v120 M90,230 v120 M100,240 v120 M110,248 v120 M120,255 v120" />
        <!-- Center (Short - near mouth) -->
        <path d="M130,265 v110 M146,270 v110 M162,265 v110" />
        <!-- Right (Long) -->
        <path d="M172,255 v120 M182,248 v120 M192,240 v120 M202,230 v120 M212,220 v120 M222,212 v120 M232,205 v120" />
      </g>
    </g>

    <!-- 3. Spectacles -->
    <g transform="translate(30, 125)">
      <path d="M0,15 C0,0 95,0 95,15 C95,55 75,75 47.5,75 C20,75 0,55 0,15 Z" stroke="white" stroke-width="12" stroke-linecap="round"/>
      <path d="M115,15 C115,0 210,0 210,15 C210,55 190,75 162.5,75 C135,75 115,55 115,15 Z" stroke="white" stroke-width="12" stroke-linecap="round"/>
      <path d="M96,25 C100,10 110,10 114,25" stroke="white" stroke-width="10" stroke-linecap="round"/>
      <path d="M0,25 H-25" stroke="white" stroke-width="8" stroke-linecap="round" stroke-opacity="0.6"/>
      <path d="M210,25 H235" stroke="white" stroke-width="8" stroke-linecap="round" stroke-opacity="0.6"/>
    </g>

    <!-- 4. Brow Line -->
    <path d="M80,110 C95,100 115,100 130,110" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round"/>
    <path d="M165,110 C180,100 200,100 215,110" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round"/>
  </g>
</svg>